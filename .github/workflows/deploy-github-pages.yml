# Build with Vite SSG and deploy to GitHub Pages.
# Repo → Settings → Pages → Source: GitHub Actions.
#
# Default base path is /REPOSITORY_NAME/ (project site at user.github.io/repo/).
# For a user/org site (repo named YOUR_USERNAME.github.io at the root URL), set env VITE_BASE_URL to / in the Build step below.
# RSVP: add repo secret VITE_APPS_SCRIPT_URL (Google Apps Script web app /exec URL) so the built site can submit forms.
#
# The `install` job warms the pnpm store; other jobs use actions/setup-node `cache: pnpm`
# (GitHub Actions dependency cache) so `pnpm install` restores from the same cache key.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Version from package.json "packageManager" (pnpm@10.12.1)
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  typecheck:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Version from package.json "packageManager" (pnpm@10.12.1)
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Version from package.json "packageManager" (pnpm@10.12.1)
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  build:
    needs: [typecheck, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Version from package.json "packageManager" (pnpm@10.12.1)
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
        env:
          VITE_BASE_URL: /${{ github.event.repository.name }}/
          VITE_APPS_SCRIPT_URL: ${{ secrets.VITE_APPS_SCRIPT_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
